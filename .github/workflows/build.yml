name: Build

on:
  push:
    branches: [main]
  workflow_dispatch:

env:
  IDP_HOST: ${{ vars.IDP_HOST }}
  REGISTRY: ghcr.io

jobs:
  build:
    runs-on: ubuntu-latest
    permissions:
      contents: write
      packages: write

    steps:
      - uses: actions/checkout@v4

      - name: Create IDP build
        id: idp-build
        run: |
          RESPONSE=$(curl -sf -X POST "$IDP_HOST/api/v1/applications/${{ github.event.repository.name }}/builds" \
            -H "Authorization: API-Key ${{ secrets.IDP_API_KEY }}" \
            -H "Content-Type: application/json" \
            -d "{\"metadata\":{\"ref\":\"$GITHUB_REF\",\"sha\":\"$GITHUB_SHA\",\"run_id\":\"$GITHUB_RUN_ID\"}}")
          BUILD_ID=$(echo "$RESPONSE" | jq -r '.id')
          echo "build_id=$BUILD_ID" >> "$GITHUB_OUTPUT"
          echo "Build ID: $BUILD_ID"

      - name: Mark build as running
        run: |
          curl -sf -X PATCH "$IDP_HOST/api/v1/applications/${{ github.event.repository.name }}/builds/${{ steps.idp-build.outputs.build_id }}" \
            -H "Authorization: API-Key ${{ secrets.IDP_API_KEY }}" \
            -H "Content-Type: application/json" \
            -d '{"status":"running"}'

      - name: Log in to GHCR
        uses: docker/login-action@v3
        with:
          registry: ghcr.io
          username: ${{ github.actor }}
          password: ${{ secrets.GITHUB_TOKEN }}

      - name: Set up QEMU
        uses: docker/setup-qemu-action@v3

      - name: Set up Docker Buildx
        uses: docker/setup-buildx-action@v3

      - name: Build and register all k8s-deployment targets
        run: |
          BUILD_ID="${{ steps.idp-build.outputs.build_id }}"
          REPO="${{ github.event.repository.name }}"
          OWNER="${{ github.repository_owner }}"

          for dir in k8s-deployment/*/; do
            subdir=$(basename "$dir")
            dockerfile="$dir/app/Dockerfile"
            idp_json="$dir/idp.json"

            if [ ! -f "$dockerfile" ] || [ ! -f "$idp_json" ]; then
              echo "==> Skipping $subdir (missing app/Dockerfile or idp.json)"
              continue
            fi

            ARTIFACT_NAME=$(jq -r '.artifactName' "$idp_json")
            SPEC_ID=$(jq -r '.specId' "$idp_json")
            IMAGE="ghcr.io/${OWNER}/${REPO}-${subdir}"
            TAG="$BUILD_ID"

            echo "==> Building $subdir → $IMAGE:$TAG (artifact: $ARTIFACT_NAME)"

            docker buildx build \
              --platform linux/amd64,linux/arm64 \
              --file "$dockerfile" \
              --context "$dir/app" \
              --tag "$IMAGE:$TAG" \
              --push

            echo "==> Registering artifact $ARTIFACT_NAME for $subdir"
            curl -sf -X POST "$IDP_HOST/api/v1/applications/${REPO}/builds/${BUILD_ID}/artifacts" \
              -H "Authorization: API-Key ${{ secrets.IDP_API_KEY }}" \
              -H "Content-Type: application/json" \
              -d "{\"name\":\"$ARTIFACT_NAME\",\"type\":\"docker-image\",\"specId\":\"$SPEC_ID\",\"metadata\":{\"image\":\"$IMAGE\",\"tag\":\"$TAG\"}}"

            echo "==> Done: $subdir"
          done

      - name: Finalize build — success
        if: success()
        run: |
          curl -sf -X PATCH "$IDP_HOST/api/v1/applications/${{ github.event.repository.name }}/builds/${{ steps.idp-build.outputs.build_id }}" \
            -H "Authorization: API-Key ${{ secrets.IDP_API_KEY }}" \
            -H "Content-Type: application/json" \
            -d '{"status":"succeeded"}'

      - name: Finalize build — failure
        if: failure()
        run: |
          curl -sf -X PATCH "$IDP_HOST/api/v1/applications/${{ github.event.repository.name }}/builds/${{ steps.idp-build.outputs.build_id }}" \
            -H "Authorization: API-Key ${{ secrets.IDP_API_KEY }}" \
            -H "Content-Type: application/json" \
            -d '{"status":"failed"}'
